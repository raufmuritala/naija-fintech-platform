version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # GCP credentials - mounted from local file
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-service-account.json
    # Project config - loaded from .env
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET: ${GCS_BUCKET}
    BIGQUERY_DATASET: ${BIGQUERY_DATASET}
    # Source DB
    SOURCE_DB_CONN: postgresql+psycopg2://naija:naija123@postgres-source:5432/naijabank
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./secrets:/opt/airflow/secrets:ro
    - ./scripts:/opt/airflow/scripts:ro
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - naija-net

services:
  # ─── Airflow metadata DB ───────────────────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - naija-net

  # ─── Source database (mock neobank) ───────────────────────────────────────
  postgres-source:
    image: postgres:15
    environment:
      POSTGRES_USER: naija
      POSTGRES_PASSWORD: naija123
      POSTGRES_DB: naijabank
    ports:
      - "5433:5432"   # exposed so you can connect via pgAdmin / DBeaver
    volumes:
      - postgres-source-data:/var/lib/postgresql/data
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "naija", "-d", "naijabank"]
      interval: 10s
      retries: 5
    networks:
      - naija-net

  # ─── Airflow init (DB migrate + admin user) ────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@naijabank.dev
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres-airflow:
        condition: service_healthy

  # ─── Airflow scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── pgAdmin ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@naijabank.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infra/pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - naija-net

volumes:
  postgres-airflow-data:
  postgres-source-data:
  pgadmin-data:

networks:
  naija-net:
    driver: bridge
